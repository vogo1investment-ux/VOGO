<!DOCTYPE html>
<html>
<head>
<title>Deposit</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.box{
background:black;
padding:20px;
border-radius:15px;
border:1px solid #00cc66;
margin-top:20px;
}

input,button{
width:100%;
padding:15px;
margin-top:12px;
background:#111;
color:white;
border:1px solid #00cc66;
border-radius:10px;
}

button{
background:#00cc66;
color:black;
}

.pending{color:orange}
.approved{color:#00cc66}

</style>
</head>

<body>

<div class="box">

<h2>Deposit</h2>

<input id="bank" placeholder="Bank Name">

<input id="name" placeholder="Account Name">

<input id="amount" placeholder="Amount">

<button onclick="submitDeposit()">

Submit Deposit

</button>

</div>

<div class="box">

<h3>

Deposit History

</h3>

<div id="history">

Loading...

</div>

</div>

<script type="module">

import {initializeApp}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

window.submitDeposit=
async()=>{

await addDoc(

collection(
db,
"deposits"
),

{

bank:
document.getElementById(
"bank"
).value,

name:
document.getElementById(
"name"
).value,

amount:
Number(
document.getElementById(
"amount"
).value
),

status:
"pending"

}

);

alert(
"Deposit Submitted"
);

loadHistory();

};

async function loadHistory(){

const snap=
await getDocs(
collection(
db,
"deposits"
)
);

let html="";

snap.forEach((d)=>{

let x=d.data();

html+=`

<div>

$${x.amount}

<br>

<span class="${
x.status
}">

${x.status}

</span>

</div>

<hr>

`;

});

document.getElementById(
"history"
).innerHTML=
html;

}

loadHistory();

</script>

</body>
</html>
