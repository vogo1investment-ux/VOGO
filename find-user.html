<!DOCTYPE html>
<html>
<head>

<title>

Find User

</title>

<style>

body{
background:#111;
padding:20px;
color:white;
font-family:Arial;
}

input,button{
width:100%;
padding:15px;
margin-top:10px;
}

button{
background:#00cc66;
border:none;
}

.box{
background:black;
padding:20px;
margin-top:20px;
border-radius:15px;
}

</style>

</head>

<body>

<input

id="search"

placeholder="Username">

<button onclick="findUser()">

Search User

</button>

<div class="box"

id="result">

No Result

</div>

<script>

function findUser(){

let u=

document

.getElementById(

"search"

)

.value;

document

.getElementById(

"result"

)

.innerHTML=

u+

"<br><br><a href='chat.html'>Chat</a>";

}

</script>

</body>

</html>
