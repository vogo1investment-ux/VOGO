<!DOCTYPE html>
<html>
<head>

<title>

Find Users

</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.top{
background:linear-gradient(
135deg,
#00cc66,
#008844
);
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

input,button{

width:100%;

padding:15px;

margin-top:12px;

border-radius:10px;

}

input{
background:black;
color:white;
border:1px solid #00cc66;
}

button{
background:#00cc66;
border:none;
font-weight:bold;
}

.user{
background:black;
padding:20px;
border-radius:15px;
border:1px solid #00cc66;
margin-top:20px;
}

.chat{
display:block;
margin-top:12px;
padding:12px;
background:#00cc66;
color:black;
text-align:center;
text-decoration:none;
border-radius:10px;
}

.notice{
margin-top:20px;
font-weight:bold;
font-size:20px;
color:#00cc66;
}

</style>

</head>

<body>

<div class="top">

💬 Find Users

</div>

<input

id="search"

placeholder="Search Username">

<button onclick="findUser()">

Search User

</button>

<div id="result">

</div>

<div class="notice">

USERS SELLING ON WHATSAPP ARE NOT ONLINE

WAIT 10 MINUTES AND REFRESH

</div>

<script>

function findUser(){

let u=

document

.getElementById(

"search"

)

.value;



document

.getElementById(

"result"

)

.innerHTML=

`

<div class="user">

Username:

${u}

<a href="chat.html"

class="chat">

Open Chat

</a>

</div>

`;

}

</script>

</body>

</html>
