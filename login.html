<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOOGO Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
overflow:hidden;
background:linear-gradient(135deg,#0d6efd,#00bfff);
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url('images/dollar.png') center center no-repeat;
background-size:350px;
opacity:0.08;
z-index:0;
}

.login-box{
background:white;
width:100%;
max-width:450px;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
z-index:1;
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:120px;
height:120px;
object-fit:contain;
}

.text{
text-align:center;
color:#555;
margin-bottom:30px;
font-size:18px;
font-weight:bold;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#0d6efd;
}

button{
width:100%;
padding:16px;
background:#0d6efd;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056d2;
}

.bottom{
text-align:center;
margin-top:20px;
}

.bottom a{
text-decoration:none;
font-weight:bold;
color:#0d6efd;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">
<img src="images/dollar.png">
</div>

<div class="text">
Login To Your Account
</div>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="bottom">
<a href="signup.html">
Create New Account
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


import {
getFirestore,
collection,
query,
where,
getDocs
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",
  authDomain: "voogo-48569.firebaseapp.com",
  projectId: "voogo-48569",
  storageBucket: "voogo-48569.firebasestorage.app",
  messagingSenderId: "735597967945",
  appId: "1:735597967945:web:346f2a0506d55f7e651d98"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



window.login = async function(){

const username = document.getElementById("username").value;

const password = document.getElementById("password").value;


if(!username || !password){

alert("Please fill all fields");

return;

}


try{


const q = query(
collection(db,"users"),
where("username","==",username)
);


const querySnapshot = await getDocs(q);


if(querySnapshot.empty){

alert("Username not found");

return;

}


let email = "";


querySnapshot.forEach((doc)=>{

email = doc.data().email;

});



await signInWithEmailAndPassword(
auth,
email,
password
);


alert("Login Successful");


window.location.href = "dashboard.html";


}

catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
