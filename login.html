<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOOGO Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:black;
width:100%;
max-width:450px;
padding:35px;
border-radius:20px;
border:2px solid #00cc66;
}

h1{
text-align:center;
color:#00cc66;
margin-bottom:10px;
}

p{
text-align:center;
color:white;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
margin-bottom:18px;
border-radius:10px;
border:1px solid #00cc66;
background:#111;
color:white;
}

button{
width:100%;
padding:16px;
background:#00cc66;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.bottom{
text-align:center;
margin-top:20px;
}

.bottom a{
color:#00cc66;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h1>

Login

</h1>

<p>

Access your VOOGO account

</p>

<input type="text"
placeholder="Username">

<input type="password"
placeholder="Password">

<button>

Login

</button>

<div class="bottom">

<a href="signup.html">

Create Account

</a>

</div>

</div>

</body>

</html>
