<!DOCTYPE html>
<html>

<title>Withdrawal</title>
</head>

<body>

<div id="history">

</div>

<script type="module">

import {initializeApp}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
getDocs,
collection
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

async function load(){

const snap=
await getDocs(
collection(
db,
"withdrawals"
)
);

let html="";

snap.forEach((d)=>{

let x=d.data();

html+=`

<div>

$${x.amount}

-

${x.status}

</div>

`;

});

document.getElementById(
"history"
).innerHTML=
html;

}

load();

</script>

</body>

</html>
