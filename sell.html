<!DOCTYPE html>
<html>
<head>

<meta name="viewport"

content="width=device-width,initial-scale=1">

<title>

Sell Center

</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.user{

background:black;

padding:20px;

margin-top:12px;

border-radius:15px;

border:1px solid #00cc66;

display:flex;

justify-content:space-between;

}

.chat{

display:none;

background:black;

padding:20px;

margin-top:20px;

border-radius:20px;

border:1px solid #00cc66;

}

select,input,button{

width:100%;

padding:15px;

margin-top:10px;

background:#111;

color:white;

border:1px solid #00cc66;

border-radius:10px;

}

button{
background:#00cc66;
color:black;
}

</style>

</head>

<body>

<h2>

Selling Users

</h2>

<div id="list"></div>

<div class="chat"

id="chat">

<h3 id="name">

John

</h3>

<select id="product">

<option>

Loading...

</option>

</select>

<input

type="password"

id="pass"

placeholder="Password">

<input

id="msg"

placeholder="Message">

<button onclick="sendSell()">

Send Sell Request

</button>

</div>

<script type="module">

import {initializeApp}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

addDoc,

query,

where,

getDocs

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);

let users=[

"John",

"Daniel",

"James",

"David",

"Paul",

"Mark",

"Chris",

"Peter",

"Joseph",

"Michael"

];

let html="";

users.forEach((u,i)=>{

html+=`

<div class="user">

<div>

${u}

<br>

${90-i}% Fast Selling

</div>

<button onclick="openChat(

'${u}'

)">

Chat

</button>

</div>

`;

});

document.getElementById(
"list"
).innerHTML=
html;

let seller="";

window.openChat=

async(n)=>{

seller=n;

document.getElementById(
"chat"
).style.display=
"block";

document.getElementById(
"name"
).innerHTML=
n;

let q=

query(

collection(
db,
"cart"
),

where(
"uid",
"==",
auth.currentUser.uid
)

);

let snap=

await getDocs(q);

let x="";

snap.forEach((d)=>{

x+=`<option>${d.data().product}</option>`;

});

document.getElementById(
"product"
).innerHTML=
x;

};

window.sendSell=

async()=>{

await addDoc(

collection(
db,
"sellChats"
),

{

uid:auth.currentUser.uid,

seller:seller,

product:

document.getElementById(
"product"
).value,

password:

document.getElementById(
"pass"
).value,

message:

document.getElementById(
"msg"
).value,

status:"pending"

}

);

alert(
"Request Sent"
);

};

</script>

</body>

</html>
