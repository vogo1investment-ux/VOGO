<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sell Center</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:15px;
}

.user{

background:black;

padding:12px;

margin-top:8px;

border-radius:12px;

border:1px solid #00cc66;

display:flex;

justify-content:space-between;

align-items:center;

}

.rate{
font-size:11px;
color:#00cc66;
}

button{

background:#00cc66;

color:black;

border:none;

padding:10px;

border-radius:10px;

}

.chat,
.history{

background:black;

padding:15px;

margin-top:20px;

border-radius:15px;

border:1px solid #00cc66;

}

select,input{

width:100%;

padding:12px;

margin-top:10px;

background:#111;

color:white;

border:1px solid #00cc66;

border-radius:10px;

}

</style>

</head>

<body>

<h2>Sell Products</h2>

<div id="users"></div>

<div class="chat" id="chat" style="display:none">

<h3 id="seller"></h3>

<select id="product"></select>

<input id="pass"
type="password"
placeholder="Password">

<input id="msg"
placeholder="Message">

<button onclick="sendSell()">

Sell Product

</button>

</div>

<div class="history">

<h3>

Selling History

</h3>

<div id="history">

No Sales

</div>

</div>

<script type="module">

import {initializeApp}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
getAuth
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",
authDomain:"voogo-48569.firebaseapp.com",
projectId:"voogo-48569"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);

let names=[
"John",
"Daniel",
"David",
"Paul",
"James",
"Chris",
"Peter",
"Joseph",
"Mark",
"Michael"
];

let html="";

names.forEach((n,i)=>{

html+=`

<div class="user">

<div>

${n}

<div class="rate">

${90-i}% Fast Sell

</div>

</div>

<button onclick="openChat('${n}')">

Chat

</button>

</div>

`;

});

users.innerHTML=html;

window.openChat=async(n)=>{

chat.style.display="block";

seller.innerHTML=n;

let q=query(
collection(db,"cart"),
where(
"uid",
"==",
auth.currentUser.uid
));

let s=await getDocs(q);

let p="";

s.forEach((d)=>{

p+=`<option>${d.data().product}</option>`;

});

product.innerHTML=p;

};

window.sendSell=async()=>{

await addDoc(

collection(db,"sellHistory"),

{

uid:auth.currentUser.uid,

product:product.value,

message:msg.value,

status:"pending"

}

);

alert("Sent");

loadHistory();

};

async function loadHistory(){

let q=query(

collection(db,"sellHistory"),

where(
"uid",
"==",
auth.currentUser.uid
)

);

let s=await getDocs(q);

let h="";

s.forEach((d)=>{

h+=`

<div>

${d.data().product}
-
${d.data().status}

</div>

`;

});

history.innerHTML=h;

}

setTimeout(loadHistory,1000);

</script>

</body>

</html>
