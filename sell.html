<!DOCTYPE html>
<html>
<head>

<title>

Sell Products

</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.box{
background:black;
padding:20px;
margin-top:20px;
border-radius:15px;
border:1px solid #00cc66;
}

.price{
font-size:28px;
color:#00cc66;
}

input,select,button{

width:100%;
padding:15px;
margin-top:12px;
background:#111;
color:white;
border:1px solid #00cc66;
border-radius:10px;

}

button{
background:#00cc66;
color:black;
}

</style>

</head>

<body>

<h2>

Sell Products

</h2>

<div id="products">

Loading...

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

collection,

query,

where,

getDocs,

doc,

getDoc,

updateDoc,

deleteDoc,

addDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);



onAuthStateChanged(

auth,

async(user)=>{

if(!user)return;



const q=

query(

collection(
db,
"cart"
),

where(
"uid",
"==",
user.uid
)

);



const snap=

await getDocs(q);



let html="";



snap.forEach((d)=>{

let x=d.data();



html+=`

<div class="box">

${x.product}

<div class="price">

$${x.price}

</div>

Cart Qty:

${x.qty}

<select id="qty-${d.id}">

<option>1</option>
<option>2</option>
<option>3</option>
<option>5</option>
<option>10</option>

</select>

<button onclick="sell(

'${d.id}',

${x.price},

${x.qty}

)">

Sell

</button>

</div>

`;

});



document

.getElementById(
"products"
)

.innerHTML=

html;

}



);



window.sell=

async(

cartId,

price,

cartQty

)=>{

let user=

auth.currentUser;



let qty=

Number(

document

.getElementById(
`qty-${cartId}`
)

.value

);



let total=

price*qty;



const userRef=

doc(
db,
"users",
user.uid
);



const snap=

await getDoc(
userRef
);



let balance=

Number(
snap.data().balance||0
);



await updateDoc(

userRef,

{

balance:

balance+total

}

);



await addDoc(

collection(
db,
"soldProducts"
),

{

uid:user.uid,

qty:qty,

price:price

}

);



if(cartQty-qty<=0){

await deleteDoc(

doc(
db,
"cart",
cartId
)

);

}

else{

await updateDoc(

doc(
db,
"cart",
cartId
),

{

qty:

cartQty-qty

}

);

}



alert(
"Sold Successfully"
);

location.reload();

};

</script>

</body>

</html>
