<!DOCTYPE html>
<html>
<head>

<title>

Sign Up

</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.box{
background:black;
padding:25px;
border-radius:20px;
border:2px solid #00cc66;
max-width:500px;
margin:auto;
}

h2{
color:#00cc66;
text-align:center;
}

input,select,button{

width:100%;

padding:15px;

margin-top:12px;

background:#111;

color:white;

border:1px solid #00cc66;

border-radius:10px;

}

button{
background:#00cc66;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>

Create Account

</h2>

<input id="username"

placeholder="Username">

<input id="fullname"

placeholder="Full Name">

<input id="email"

type="email"

placeholder="Email">

<input id="phone"

placeholder="Phone Number">

<input id="dob"

type="date">

<select id="country">

<option>

🇳🇬 Nigeria

</option>

<option>

🇬🇭 Ghana

</option>

<option>

🇺🇸 USA

</option>

<option>

🇮🇳 India

</option>

<option>

🇨🇳 China

</option>

<option>

🇫🇷 France

</option>

<option>

🇷🇺 Russia

</option>

</select>

<input id="referral"

placeholder="Referral Username (optional)">

<input id="password"

type="password"

placeholder="Password">

<button onclick="signup()">

Create Account

</button>

</div>

<script type="module">

import { initializeApp }

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

doc,

setDoc,

addDoc,

collection

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth,

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:

"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:

"voogo-48569.firebaseapp.com",

projectId:

"voogo-48569",

storageBucket:

"voogo-48569.firebasestorage.app",

messagingSenderId:

"735597967945",

appId:

"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);

window.signup=
async()=>{

let dob=

new Date(

document.getElementById(
"dob"
).value

);

let age=

new Date().getFullYear()

-

dob.getFullYear();



if(age<10){

alert(

"10 Years And Above Only"

);

return;

}



let email=

document.getElementById(
"email"
).value;

let pass=

document.getElementById(
"password"
).value;



const userCred=

await createUserWithEmailAndPassword(

auth,

email,

pass

);



let user=

userCred.user;



let username=

document.getElementById(
"username"
).value;

let ref=

document.getElementById(
"referral"
).value;



await setDoc(

doc(
db,
"users",
user.uid
),

{

username:username,

fullname:

document.getElementById(
"fullname"
).value,

email:email,

phone:

document.getElementById(
"phone"
).value,

country:

document.getElementById(
"country"
).value,

balance:0,

referral:ref,

referralBonus:0

}

);



if(ref!=""){

await addDoc(

collection(
db,
"referrals"
),

{

referrer:ref,

joined:username,

bonus:0

}

);

}



alert(

"Signup Successful"

);

};

</script>

</body>

</html>
