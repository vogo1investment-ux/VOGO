<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,

initial-scale=1.0">

<title>

VOOGO Dashboard

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
padding:20px;
padding-bottom:120px;
}

.container{
max-width:1200px;
margin:auto;
}

.balance-box{

background:black;

border:2px solid #00cc66;

padding:35px;

border-radius:20px;

margin-bottom:25px;

}

.balance-title{

font-size:20px;

color:#00cc66;

}

.usd{

font-size:55px;

font-weight:bold;

margin-top:15px;

}

.currency-grid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(180px,1fr));

gap:15px;

margin-bottom:30px;

}

.card{

background:black;

border:1px solid #00cc66;

padding:20px;

border-radius:15px;

text-align:center;

}

.card h3{

color:#00cc66;

margin-bottom:10px;

}



/* BOTTOM NAVIGATION */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

background:black;

border-top:2px solid #00cc66;

display:flex;

justify-content:space-around;

padding:12px;

z-index:1000;

}

.bottom-btn{

text-decoration:none;

color:white;

text-align:center;

font-size:13px;

}

.bottom-btn div{

font-size:24px;

margin-bottom:5px;

}



/* 3 DOT MENU */

.menu-box{

position:fixed;

right:15px;

bottom:90px;

z-index:1001;

}

.menu-btn{

background:#00cc66;

border:none;

width:55px;

height:55px;

border-radius:50%;

font-size:25px;

cursor:pointer;

font-weight:bold;

}

.dropdown{

display:none;

position:absolute;

bottom:65px;

right:0;

background:black;

border:1px solid #00cc66;

border-radius:15px;

overflow:hidden;

min-width:190px;

}

.dropdown a{

display:block;

padding:15px;

color:white;

text-decoration:none;

border-bottom:1px solid #222;

}

.dropdown a:hover{

background:#00cc66;

color:black;

}

.show{

display:block;

}

@media(max-width:768px){

.usd{

font-size:40px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="balance-box">

<div class="balance-title">

USD Balance

</div>

<div class="usd"

id="usd">

$0

</div>

</div>



<div class="currency-grid">

<div class="card"

id="ngn">

<h3>

🇳🇬 NGN

</h3>

₦0

</div>



<div class="card"

id="ghana">

<h3>

🇬🇭 Ghana

</h3>

₵0

</div>



<div class="card"

id="europe">

<h3>

🇪🇺 Europe

</h3>

€0

</div>



<div class="card"

id="china">

<h3>

🇨🇳
