<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>

Dashboard

</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
padding-bottom:100px;
}

.top{
background:
linear-gradient(
135deg,
#00cc66,
#008844
);

padding:30px;
border-radius:25px;
animation:float 4s infinite;
}

@keyframes float{
50%{transform:translateY(-5px)}
}

.balance{
font-size:50px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(150px,1fr));

gap:15px;
margin-top:20px;
}

.box{
background:black;
padding:20px;
border-radius:20px;
border:1px solid #00cc66;
text-align:center;
}

.box h2{
color:#00cc66;
}

.bottom{

position:fixed;

bottom:0;

left:0;

right:0;

background:black;

display:flex;

justify-content:space-around;

padding:15px;

border-top:1px solid #00cc66;

}

.bottom a{
color:#00cc66;
text-decoration:none;
}

</style>

</head>

<body>

<div class="top">

USD Balance

<div class="balance"

id="usd">

$0

</div>

</div>

<div class="grid">

<div class="box">

🇳🇬 NGN

<h2 id="ngn">

₦0

</h2>

</div>

<div class="box">

🇬🇭 GHS

<h2 id="gh">

0

</h2>

</div>

<div class="box">

🇨🇳 CNY

<h2 id="cn">

0

</h2>

</div>

<div class="box">

🇮🇳 INR

<h2 id="ind">

0

</h2>

</div>

<div class="box">

🇫🇷 EUR

<h2 id="eu">

0

</h2>

</div>

<div class="box">

🇷🇺 RUB

<h2 id="ru">

0

</h2>

</div>

<div class="box">

Referral

<h2 id="ref">

0

</h2>

</div>

</div>

<div class="bottom">

<a href="market.html">Market</a>

<a href="cart.html">Cart</a>

<a href="profile.html">Profile</a>

<a href="settings.html">More</a>

</div>

<script type="module">

import {initializeApp}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);

onAuthStateChanged(

auth,

async(user)=>{

if(!user)return;

let s=

await getDoc(

doc(
db,
"users",
user.uid
)

);

let d=s.data();

let usd=

Number(
d.balance||0
);

document.getElementById(
"usd"
).innerHTML=
"$"+usd;

document.getElementById(
"ngn"
).innerHTML=
"₦"+(usd*1457);

document.getElementById(
"gh"
).innerHTML=
(usd*15);

document.getElementById(
"cn"
).innerHTML=
(usd*7);

document.getElementById(
"ind"
).innerHTML=
(usd*83);

document.getElementById(
"eu"
).innerHTML=
(usd*0.92);

document.getElementById(
"ru"
).innerHTML=
(usd*81);

document.getElementById(
"ref"
).innerHTML=
"$"+
Number(
d.referralBonus||0
);

}

);

</script>

</body>
</html>
