<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,

initial-scale=1.0">

<title>

VOOGO Dashboard

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
padding:15px;
padding-bottom:110px;
}

/* TOP */

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.logo{

font-size:28px;

font-weight:bold;

color:#00cc66;

}

.menu{

font-size:30px;

cursor:pointer;

}

/* BALANCE */

.balance-box{

background:

linear-gradient(

135deg,

#00cc66,

#008844

);

padding:30px;

border-radius:22px;

margin-bottom:20px;

}

.balance-title{

font-size:18px;

opacity:0.9;

}

.balance{

font-size:45px;

font-weight:bold;

margin-top:10px;

}

/* CURRENCIES */

.currency-grid{

display:grid;

grid-template-columns:

repeat(2,1fr);

gap:15px;

margin-bottom:25px;

}

.card{

background:black;

border:1px solid #00cc66;

padding:18px;

border-radius:18px;

text-align:center;

}

.card h3{

color:#00cc66;

margin-bottom:10px;

font-size:17px;

}

/* OPAY STYLE NAV */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

background:black;

border-top:1px solid #00cc66;

display:flex;

justify-content:space-around;

padding:12px 5px;

z-index:1000;

}

.nav-btn{

text-decoration:none;

color:white;

font-size:12px;

text-align:center;

width:20%;

}

.nav-icon{

font-size:24px;

margin-bottom:4px;

}

/* DROPDOWN */

.dropdown{

display:none;

position:absolute;

top:70px;

right:15px;

background:black;

border:1px solid #00cc66;

border-radius:15px;

overflow:hidden;

width:200px;

z-index:9999;

}

.dropdown a{

display:block;

padding:15px;

color:white;

text-decoration:none;

border-bottom:1px solid #222;

}

.dropdown a:hover{

background:#00cc66;

color:black;

}

.show{

display:block;

}

@media(max-width:600px){

.balance{

font-size:38px;

}

}

</style>

</head>

<body>

<div class="top">

<!-- BOTTOM NAV -->

<!-- FIREBASE -->

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";


import {

getFirestore,

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";



const firebaseConfig = {

apiKey:

"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:

"voogo-48569.firebaseapp.com",

projectId:

"voogo-48569",

storageBucket:

"voogo-48569.firebasestorage.app",

messagingSenderId:

"735597967945",

appId:

"1:735597967945:web:346f2a0506d55f7e651d98"

};



const app=

initializeApp(firebaseConfig);

const db=

getFirestore(app);

const auth=

getAuth(app);



onAuthStateChanged(

auth,

async(user)=>{

if(user){

const ref=

doc(

db,

"users",

user.uid

);



const snap=

await getDoc(ref);



if(

snap.exists()

){

const data=

snap.data();



let usd=

Number(

data.balance || 0

);



document

.getElementById(

"usdBalance"

)

.innerHTML=

"$"

+

usd.toFixed(2);



document

.getElementById(

"ngn"

)

.innerHTML=

"<h3>🇳🇬 NGN</h3>₦"

+

(

usd*1457

)

.toLocaleString();



document

.getElementById(

"ghana"

)

.innerHTML=

"<h3>🇬🇭 Ghana</h3>₵"

+

(

usd*15

)

.toFixed(2);



document

.getElementById(

"europe"

)

.innerHTML=

"<h3>🇪🇺 Europe</h3>€"

+

(

usd*0.92

)

.toFixed(2);



document

.getElementById(

"china"

)

.innerHTML=

"<h3>🇨🇳 China</h3>¥"

+

(

usd*7.2

)

.toFixed(2);



document

.getElementById(

"india"

)

.innerHTML=

"<h3>🇮🇳 India</h3>₹"

+

(

usd*84

)

.toFixed(2);



document

.getElementById(

"russia"

)

.innerHTML=

"<h3>🇷🇺 Russia</h3>₽"

+

(

usd*82

)

.toFixed(2);

}

}

}

);



window.toggleMenu=function(){

document

.getElementById(

"dropdown"

)

.classList.toggle(

"show"

);

}

</script>

</body>
