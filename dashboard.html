<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOOGO Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.balance-box{
background:black;
border:2px solid #00cc66;
padding:30px;
border-radius:20px;
margin-bottom:25px;
}

.balance-title{
color:#00cc66;
font-size:20px;
}

.usd{
font-size:50px;
font-weight:bold;
margin-top:10px;
}

.currency-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.currency-card{
background:black;
border:1px solid #00cc66;
padding:20px;
border-radius:15px;
text-align:center;
}

.currency-card h3{
color:#00cc66;
margin-bottom:10px;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
}

.btn{
background:black;
border:2px solid #00cc66;
padding:25px;
border-radius:18px;
text-align:center;
text-decoration:none;
color:white;
transition:.3s;
}

.btn:hover{
background:#00cc66;
color:black;
}

.icon{
font-size:35px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="balance-box">

<div class="balance-title">

USD Balance

</div>

<div class="usd">

$0.00

</div>

</div>

<h3>🇳🇬 NGN</h3>
₦0
</div>

₵0
</div>

<div class="currency-card">
<h3>🇪🇺 Europe</h3>
€0
</div>

<div class="currency-card">
<h3>🇨🇳 China</h3>
¥0
</div>

<div class="currency-card">
<h3>🇮🇳 India</h3>
₹0
</div>

<div class="currency-card">
<h3>🇫🇷 France</h3>
€0
</div>

<div class="currency-card">
<h3>🇷🇺 Russia</h3>
₽0
</div>

</div>



<div class="buttons">

<a href="profile.html" class="btn">

<div class="icon">

👤

</div>

Profile

<a href="find-user.html" class="btn">

<a href="settings.html" class="btn">

<div class="icon">

⚙️

</div>

Settings

</a>

</div>

</div>

</body>

</html>
