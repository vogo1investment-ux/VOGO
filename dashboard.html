<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOOGO Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f9ff;
padding:20px;
}

.dashboard{
max-width:700px;
margin:auto;
}

.top-box{
background:linear-gradient(135deg,#0d6efd,#00bfff);
padding:35px;
border-radius:25px;
color:white;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
margin-bottom:25px;
}

.top-box h2{
font-size:20px;
margin-bottom:10px;
}

.balance{
font-size:45px;
font-weight:bold;
margin-bottom:10px;
}

.referral{
font-size:20px;
opacity:0.95;
}

.profile-box{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.profile-title{
font-size:28px;
margin-bottom:25px;
color:#0d6efd;
font-weight:bold;
}

.info{
margin-bottom:18px;
}

.label{
font-weight:bold;
font-size:15px;
color:#555;
margin-bottom:5px;
}

.value{
background:#f1f5ff;
padding:15px;
border-radius:12px;
font-size:17px;
word-break:break-word;
}

.edit-btn{
margin-top:25px;
width:100%;
padding:16px;
background:#0d6efd;
color:white;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.edit-btn:hover{
background:#0056d2;
}

@media(max-width:600px){

.balance{
font-size:35px;
}

.profile-title{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="dashboard">

<div class="top-box">

<h2>Main Balance</h2>

<div class="balance">
₦<span id="balance">0</span>
</div>

<div class="referral">
Referral Bonus:
₦<span id="referralBonus">0</span>
</div>

</div>


<div class="profile-box">

<div class="profile-title">
User Profile
</div>

<div class="info">
<div class="label">Username</div>
<div class="value" id="username">Loading...</div>
</div>

<div class="info">
<div class="label">Full Name</div>
<div class="value" id="fullname">Loading...</div>
</div>

<div class="info">
<div class="label">Email Address</div>
<div class="value" id="email">Loading...</div>
</div>

<div class="info">
<div class="label">Phone Number</div>
<div class="value" id="phone">Loading...</div>
</div>

<div class="info">
<div class="label">NIN Number</div>
<div class="value" id="nin">Loading...</div>
</div>

<div class="info">
<div class="label">Date Of Birth</div>
<div class="value" id="dob">Loading...</div>
</div>

<div class="info">
<div class="label">Referral Username</div>
<div class="value" id="referralCode">None</div>
</div>

<button class="edit-btn" onclick="editProfile()">
Edit Profile
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


import {
getFirestore,
doc,
getDoc,
updateDoc
}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",
  authDomain: "voogo-48569.firebaseapp.com",
  projectId: "voogo-48569",
  storageBucket: "voogo-48569.firebasestorage.app",
  messagingSenderId: "735597967945",
  appId: "1:735597967945:web:346f2a0506d55f7e651d98"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



onAuthStateChanged(auth, async(user)=>{

if(user){

const docRef = doc(db,"users",user.uid);

const docSnap = await getDoc(docRef);


if(docSnap.exists()){

const data = docSnap.data();


document.getElementById("balance").innerText =
data.balance || 0;

document.getElementById("referralBonus").innerText =
data.referralEarnings || 0;

document.getElementById("username").innerText =
data.username || "";

document.getElementById("fullname").innerText =
data.fullname || "";

document.getElementById("email").innerText =
data.email || "";

document.getElementById("phone").innerText =
data.phone || "";

document.getElementById("nin").innerText =
data.nin || "";

document.getElementById("dob").innerText =
data.dob || "";

document.getElementById("referralCode").innerText =
data.referralCode || "None";

}

}else{

window.location.href = "login.html";

}

});



window.editProfile = async function(){

const user = auth.currentUser;

if(!user) return;


const newUsername = prompt(
"Enter new username:"
);

const newPhone = prompt(
"Enter new phone number:"
);


if(newUsername && newPhone){

await updateDoc(doc(db,"users",user.uid),{

username:newUsername,
phone:newPhone

});


alert("Profile Updated");

location.reload();

}

}

</script>

</body>
</html>
