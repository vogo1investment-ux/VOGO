<!DOCTYPE html>
<html>
<head>

<meta name="viewport"

content="width=device-width,initial-scale=1">

<title>

Dashboard

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
color:white;
padding:20px;
padding-bottom:100px;
}

.top{

background:

linear-gradient(
135deg,
#00cc66,
#008844
);

padding:30px;

border-radius:25px;

margin-bottom:20px;

}

.balance{

font-size:50px;

font-weight:bold;

}

.refbox{

background:black;

padding:20px;

border-radius:20px;

border:1px solid #00cc66;

margin-bottom:20px;

}

.refbox h3{
color:#00cc66;
}

.reftext{
font-size:13px;
margin-top:10px;
}

.country{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(110px,1fr));

gap:10px;

}

.cbox{

background:black;

padding:15px;

border-radius:15px;

border:1px solid #00cc66;

text-align:center;

}

.cbox span{
font-size:12px;
}

.cbox h3{
color:#00cc66;
margin-top:5px;
}

.bottom{

position:fixed;

bottom:0;

left:0;

right:0;

background:black;

display:flex;

justify-content:space-around;

padding:12px;

border-top:2px solid #00cc66;

}

.navbtn{

display:flex;

flex-direction:column;

align-items:center;

color:#00cc66;

text-decoration:none;

font-size:12px;

}

.icon{
font-size:22px;
margin-bottom:4px;
}

</style>

</head>

<body>

<div class="top">

USD Balance

<div class="balance"

id="usd">

$0

</div>

</div>

<div class="refbox">

<h3>

🎁 Referral Bonus

</h3>

<h2 id="ref">

$0

</h2>

<div class="reftext">

10% bonus is added automatically whenever your referral makes a deposit using your username.

</div>

</div>

<div class="country">

<div class="cbox">

🇳🇬

<span>

NGN

</span>

<h3 id="ngn">

₦0

</h3>

</div>

<div class="cbox">

🇬🇭

<span>

GHS

</span>

<h3 id="gh">

0

</h3>

</div>

<div class="cbox">

🇨🇳

<span>

CNY

</span>

<h3 id="cn">

0

</h3>

</div>

<div class="cbox">

🇮🇳

<span>

INR

</span>

<h3 id="ind">

0

</h3>

</div>

<div class="cbox">

🇫🇷

<span>

EUR

</span>

<h3 id="eu">

0

</h3>

</div>

<div class="cbox">

🇷🇺

<span>

RUB

</span>

<h3 id="ru">

0

</h3>

</div>

</div>

<div class="bottom">

<a class="navbtn"

href="market.html">

<div class="icon">

🛒

</div>

Market

</a>

<a class="navbtn"

href="cart.html">

<div class="icon">

🧺

</div>

Cart

</a>

<a class="navbtn"

href="referral.html">

<div class="icon">

🎁

</div>

Referral

</a>

<a class="navbtn"

href="profile.html">

<div class="icon">

👤

</div>

Profile

</a>

<a class="navbtn"

href="settings.html">

<div class="icon">

☰

</div>

More

</a>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {

getAuth,

onAuthStateChanged

}

from

"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyDRAcsC8RUTPtxbMdHjHpYZH2LjaP8jqMM",

authDomain:"voogo-48569.firebaseapp.com",

projectId:"voogo-48569",

storageBucket:"voogo-48569.firebasestorage.app",

messagingSenderId:"735597967945",

appId:"1:735597967945:web:346f2a0506d55f7e651d98"

};

const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);

const auth=
getAuth(app);

onAuthStateChanged(

auth,

async(user)=>{

if(!user)return;

let snap=

await getDoc(

doc(
db,
"users",
user.uid
)

);

let d=

snap.data();

let usd=

Number(
d.balance||0
);

document.getElementById(
"usd"
).innerHTML=
"$"+usd;

document.getElementById(
"ngn"
).innerHTML=
"₦"+(usd*1457);

document.getElementById(
"gh"
).innerHTML=
(usd*15).toFixed(2);

document.getElementById(
"cn"
).innerHTML=
(usd*7).toFixed(2);

document.getElementById(
"ind"
).innerHTML=
(usd*83).toFixed(2);

document.getElementById(
"eu"
).innerHTML=
(usd*0.92).toFixed(2);

document.getElementById(
"ru"
).innerHTML=
(usd*81).toFixed(2);

document.getElementById(
"ref"
).innerHTML=
"$"+
Number(
d.referralBonus||0
);

}

);

</script>

</body>

</html>
